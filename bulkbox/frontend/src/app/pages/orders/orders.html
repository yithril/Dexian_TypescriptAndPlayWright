<h1>Orders</h1>

<table class="orders" data-testid="orders-table">
  <thead>
    <tr>
      <th>
        <button type="button" class="orders__sort" (click)="sortBy('id')" data-testid="sort-id">
          Order #
          @if (sortKey() === 'id') { <span aria-hidden="true">{{ sortDir() === 'asc' ? '▲' : '▼' }}</span> }
        </button>
      </th>
      <th>
        <button type="button" class="orders__sort" (click)="sortBy('customer')" data-testid="sort-customer">
          Customer
          @if (sortKey() === 'customer') { <span aria-hidden="true">{{ sortDir() === 'asc' ? '▲' : '▼' }}</span> }
        </button>
      </th>
      <th>
        <button type="button" class="orders__sort" (click)="sortBy('total')" data-testid="sort-total">
          Total
          @if (sortKey() === 'total') { <span aria-hidden="true">{{ sortDir() === 'asc' ? '▲' : '▼' }}</span> }
        </button>
      </th>
      <th>
        <button type="button" class="orders__sort" (click)="sortBy('status')" data-testid="sort-status">
          Status
          @if (sortKey() === 'status') { <span aria-hidden="true">{{ sortDir() === 'asc' ? '▲' : '▼' }}</span> }
        </button>
      </th>
    </tr>
  </thead>
  <tbody>
    @for (order of pageRows(); track order.id) {
      <tr data-testid="order-row">
        <td data-testid="cell-id">{{ order.id }}</td>
        <td data-testid="cell-customer">{{ order.customer }}</td>
        <td data-testid="cell-total">{{ order.total | currency }}</td>
        <td data-testid="cell-status">{{ order.status }}</td>
      </tr>
    }
  </tbody>
</table>

<div class="pager">
  <button
    type="button"
    class="btn btn--ghost"
    (click)="previousPage()"
    [disabled]="page() === 1"
    data-testid="pagination-prev"
  >Previous</button>

  <span class="pager__label" data-testid="page-indicator">Page {{ page() }} of {{ totalPages() }}</span>

  <button
    type="button"
    class="btn btn--ghost"
    (click)="nextPage()"
    [disabled]="page() === totalPages()"
    data-testid="pagination-next"
  >Next</button>
</div>
