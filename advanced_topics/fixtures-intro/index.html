<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Team standup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <h1>Team standup</h1>
    <p class="lede">Today&apos;s tasks — clean markup so the lesson stays on fixtures.</p>

    <ul class="task-list" aria-label="Standup tasks">
      <li class="task-item">
        <span class="task-title">Review pull requests</span>
        <span class="task-status" aria-live="polite">Open</span>
        <button type="button" class="mark-done">Mark done</button>
      </li>
      <li class="task-item">
        <span class="task-title">Update test documentation</span>
        <span class="task-status" aria-live="polite">Open</span>
        <button type="button" class="mark-done">Mark done</button>
      </li>
      <li class="task-item">
        <span class="task-title">Pair on flaky test fix</span>
        <span class="task-status" aria-live="polite">Open</span>
        <button type="button" class="mark-done">Mark done</button>
      </li>
    </ul>
  </main>

  <script src="app.js"></script>
</body>
</html>
